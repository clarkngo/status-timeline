<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justine Cho — Hover Timeline | Status Timeline</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { background: #f8f9fc; font-family: 'Inter', system-ui, sans-serif; }

    /* ── Status banner ── */
    .status-banner { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }

    /* ── Filter chip ── */
    .filter-chip { cursor: pointer; transition: all 0.15s ease; user-select: none; }
    .filter-chip.active { background: #1e293b; color: #fff; border-color: #1e293b; }

    /* ── Sort btn ── */
    .sort-btn { transition: all 0.15s ease; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Keyframes ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-item { opacity: 0; animation: fadeInUp 0.35s ease forwards; }
    @media (prefers-reduced-motion: reduce) { .card-item { opacity: 1; animation: none; } }

    /* ══════════════════════════════════════════
       HOVER CARD — the heart of this view
    ══════════════════════════════════════════ */
    .hover-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #f1f5f9;
      border-left-width: 4px;
      box-shadow: 0 1px 4px -1px rgba(0,0,0,0.06);
      cursor: default;
      /* smooth height transition for the detail panel */
      transition: box-shadow 0.2s ease, transform 0.2s ease;
      overflow: hidden;
    }

    /* Desktop hover */
    @media (hover: hover) {
      .hover-card:hover {
        box-shadow: 0 8px 28px -6px rgba(0,0,0,0.13), 0 3px 10px -3px rgba(0,0,0,0.07);
        transform: translateY(-2px);
      }
      .hover-card:hover .detail-panel { max-height: 160px; opacity: 1; }
      .hover-card:hover .chevron       { opacity: 0.6; transform: rotate(180deg); }
    }

    /* Tap-open state (JS toggles .open) */
    .hover-card.open {
      box-shadow: 0 8px 28px -6px rgba(0,0,0,0.13), 0 3px 10px -3px rgba(0,0,0,0.07);
    }
    .hover-card.open .detail-panel { max-height: 160px; opacity: 1; }
    .hover-card.open .chevron       { opacity: 0.6; transform: rotate(180deg); }

    /* ── Summary row (always visible) ── */
    .card-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      user-select: none;
    }

    /* ── Detail panel (hidden until hover/open) ── */
    .detail-panel {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
    }
    .detail-inner {
      padding: 0 14px 12px;
      border-top: 1px solid #f1f5f9;
      padding-top: 10px;
    }

    /* ── Chevron ── */
    .chevron { transition: transform 0.22s ease, opacity 0.22s ease; opacity: 0.2; flex-shrink: 0; }

    /* ── Year divider ── */
    .year-divider {
      grid-column: 1 / -1;           /* span all columns */
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0 2px;
    }
    .year-divider span {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #94a3b8;
      white-space: nowrap;
    }
    .year-divider::before, .year-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }
    .year-divider::before { display: none; }  /* left side hidden; label is leftmost */

    /* ── Grid ── */
    .cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    @media (min-width: 600px) {
      .cards-grid { grid-template-columns: 1fr 1fr; }
    }

    /* ── Hidden by filter ── */
    .card-item.hidden-by-filter { display: none; }

    /* ── View toggle ── */
    .view-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .view-pill-inactive { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #94a3b8; }
    .view-pill-inactive:hover { color: #fff; background: rgba(255,255,255,0.15); }
    .view-pill-active { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3); color: #fff; }
  </style>
</head>

<body class="min-h-screen text-slate-800">

  <!-- ══════════════════════════════════════════
       STICKY HEADER
  ══════════════════════════════════════════ -->
  <header class="status-banner sticky top-0 z-50 shadow-xl">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between gap-3">

      <!-- Left: back + name + view switcher -->
      <div class="flex items-center gap-2.5 min-w-0">
        <a href="index.html" class="text-slate-400 hover:text-slate-200 transition-colors shrink-0" aria-label="Home">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-white font-semibold text-base leading-tight truncate">Justine Cho</h1>
        <!-- View switcher (desktop) -->
        <div class="hidden sm:flex items-center gap-1.5 ml-1">
          <a href="justine-cho.html"         class="view-pill view-pill-inactive">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
            Full
          </a>
          <a href="justine-cho-compact.html" class="view-pill view-pill-inactive">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h8M4 18h16"/></svg>
            Compact
          </a>
          <span class="view-pill view-pill-active">
            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Hover
          </span>
        </div>
      </div>

      <!-- Right: snapshot + milestone pill -->
      <div class="flex items-center gap-2 shrink-0">
        <a href="snapshot.html" class="inline-flex items-center gap-1.5 text-slate-400 hover:text-white text-xs font-medium transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M3 9h18M9 21V9"/></svg>
          Snapshot
        </a>
        <div class="flex items-center gap-2 bg-white/10 border border-white/20 rounded-xl px-3 py-2">
          <span class="relative flex h-2 w-2 shrink-0">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
          </span>
          <p class="text-white text-xs font-semibold">
            <span class="sm:hidden">Jun 9, 2026</span>
            <span class="hidden sm:inline">Interview — June 9, 2026</span>
          </p>
        </div>
      </div>

    </div>
  </header>

  <!-- ══════════════════════════════════════════
       CONTROLS
  ══════════════════════════════════════════ -->
  <div class="max-w-5xl mx-auto pt-5 pb-1">
    <div class="overflow-x-auto scrollbar-hide px-4 sm:px-6 pb-1">
      <div class="flex gap-2 w-max sm:w-auto sm:flex-wrap" id="filter-bar" role="group" aria-label="Filter by category">
        <button class="filter-chip active text-xs font-medium px-3 py-1.5 rounded-full border border-slate-200 bg-white text-slate-600 whitespace-nowrap" data-filter="all">All</button>
        <button class="filter-chip text-xs font-medium px-3 py-1.5 rounded-full border border-slate-200 bg-white text-slate-600 whitespace-nowrap" data-filter="student">Student / F1</button>
        <button class="filter-chip text-xs font-medium px-3 py-1.5 rounded-full border border-slate-200 bg-white text-slate-600 whitespace-nowrap" data-filter="work">Work Visas</button>
        <button class="filter-chip text-xs font-medium px-3 py-1.5 rounded-full border border-slate-200 bg-white text-slate-600 whitespace-nowrap" data-filter="greencard">Green Card</button>
        <button class="filter-chip text-xs font-medium px-3 py-1.5 rounded-full border border-slate-200 bg-white text-slate-600 whitespace-nowrap" data-filter="ead">EAD / I-765</button>
        <button class="filter-chip text-xs font-medium px-3 py-1.5 rounded-full border border-slate-200 bg-white text-slate-600 whitespace-nowrap" data-filter="appeals">Appeals</button>
        <div class="flex items-center gap-1 ml-2 shrink-0 bg-slate-100 rounded-full p-0.5">
          <button id="sort-asc"  class="sort-btn text-xs font-medium px-3 py-1.5 rounded-full bg-white shadow-sm text-slate-700 whitespace-nowrap">↑ Oldest</button>
          <button id="sort-desc" class="sort-btn text-xs font-medium px-3 py-1.5 rounded-full text-slate-500 whitespace-nowrap">↓ Newest</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       CARD GRID
  ══════════════════════════════════════════ -->
  <main class="max-w-5xl mx-auto px-4 sm:px-6 py-5">

    <!-- Hint -->
    <p id="hover-hint" class="text-center text-xs text-slate-400 mb-4 transition-opacity duration-300">
      <span class="hidden sm:inline">Hover</span><span class="sm:hidden">Tap</span> a card to reveal details
    </p>

    <div class="cards-grid" id="cards-grid"></div>

    <div id="empty-state" class="hidden text-center py-16 text-slate-400 text-sm">No events match this filter.</div>

  </main>

  <!-- Snapshot CTA -->
  <div class="max-w-5xl mx-auto px-4 sm:px-6 pb-10">
    <a href="snapshot.html"
       class="flex items-center justify-center gap-2.5 w-full rounded-2xl border border-slate-200 bg-white
              px-5 py-4 text-sm font-semibold text-slate-600 shadow-sm
              hover:border-slate-300 hover:text-slate-800 hover:shadow-md transition-all group">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-slate-400 group-hover:text-slate-600 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/>
      </svg>
      View &amp; Save Status Snapshot
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-slate-300 group-hover:text-slate-400 group-hover:translate-x-0.5 transition-all" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
    </a>
  </div>

  <!-- ══════════════════════════════════════════
       DATA + JS
  ══════════════════════════════════════════ -->
  <script>
    // ── Style maps (same as full timeline) ──────────────────────────────────────
    const STATUS = {
      success:  {
        border: 'border-l-emerald-400', dot: 'text-emerald-500',
        badge:  'bg-emerald-50 text-emerald-700 ring-emerald-200',
        icon: `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`,
      },
      warning:  {
        border: 'border-l-amber-400',   dot: 'text-amber-500',
        badge:  'bg-amber-50 text-amber-700 ring-amber-200',
        icon: `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>`,
      },
      critical: {
        border: 'border-l-rose-400',    dot: 'text-rose-500',
        badge:  'bg-rose-50 text-rose-700 ring-rose-200',
        icon: `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>`,
      },
      info:     {
        border: 'border-l-sky-400',     dot: 'text-sky-500',
        badge:  'bg-sky-50 text-sky-700 ring-sky-200',
        icon: `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M12 2a10 10 0 100 20A10 10 0 0012 2z"/></svg>`,
      },
    };

    // ── Events data ──────────────────────────────────────────────────────────────
    const EVENTS = [
      { sortKey:201103, date:'Mar 2011',  title:'Turned 21 — I-485 Denied',                note:'Aged out of dependent child status; prior adjustment of status application denied.',                                   status:'warning',  categories:['greencard'],           badges:['I-485 Denial','Age-Out'] },
      { sortKey:201211, date:'Nov 2012',  title:'New Priority Date Established',            note:'Filed F2B petition under LPR parent; new priority date locks place in visa queue.',                                    status:'success',  categories:['greencard'],           badges:['F2B Petition','I-130','New PD'] },
      { sortKey:201101, date:'2011–2015', title:'F1 Student Visa / OPT',                   note:'Maintained lawful status throughout academic program and optional practical training period.',                           status:'info',     categories:['student'],             badges:['F1 Status','OPT'] },
      { sortKey:201501, date:'2015–2021', title:'H-1B Work Visa',                          note:'Employer-sponsored specialty occupation visa; continuous legal work authorization maintained.',                         status:'info',     categories:['work'],                badges:['H-1B Visa'] },
      { sortKey:202104, date:'Apr 2021',  title:'Priority Date Current (F1 Category)',     note:'Parent naturalized; petition converted from F2B → F1, which was immediately current.',                                 status:'success',  categories:['greencard'],           badges:['F1 Category','PD Current','I-130'] },
      { sortKey:202108, date:'Aug 2021',  title:'H-1B Employment Ended',                   note:'Resigned from employer; created gap in work authorization prior to EAD receipt.',                                       status:'warning',  categories:['work'],                badges:['H-1B','Gap in Status'] },
      { sortKey:202111, date:'Nov 2021',  title:'I-765 & I-131 Approved',                  note:'Employment Authorization Document and Advance Parole approved; work and travel rights restored.',                      status:'success',  categories:['ead'],                 badges:['I-765 EAD','I-131 Parole'] },
      { sortKey:202306, date:'Jun 2023',  title:'I-765 & I-131 Renewal — I-765 Approved',  note:'Biennial renewal submitted; EAD approved the same month. Advance Parole pending.',                                     status:'success',  categories:['ead'],                 badges:['I-765 Renewal','I-131 Renewal'] },
      { sortKey:202405, date:'May 2024',  title:'I-131 Approved',                          note:'Advance Parole travel document issued; international travel permitted without abandoning case.',                        status:'success',  categories:['ead'],                 badges:['I-131 Approval','Travel Doc'] },
      { sortKey:202505, date:'May 2025',  title:'I-765 Renewal Filed',                     note:'Standard biennial EAD renewal submitted to maintain continuous employment authorization.',                              status:'info',     categories:['ead'],                 badges:['I-765 Renewal'] },
      { sortKey:202506, date:'Jun 2025',  title:'Biometrics Completed',                    note:'Fingerprints and photograph captured at ASC as required for I-765 renewal processing.',                                status:'info',     categories:['ead'],                 badges:['Biometrics','I-765'] },
      { sortKey:202507, date:'Jul 2025',  title:'I-130 Revocation Notice',                 note:'NVC revoked the approved I-130 petition due to lack of response for consular processing.',                             status:'critical', categories:['greencard'],           badges:['I-130 Revocation','NVC'] },
      { sortKey:202508, date:'Aug 2025',  title:'I-765 Approved',                          note:'EAD card produced and issued; uninterrupted employment authorization confirmed.',                                      status:'success',  categories:['ead'],                 badges:['I-765 Approval','EAD'] },
      { sortKey:202509, date:'Sep 2025',  title:'I-290B Filed',                            note:'Notice of Appeal filed to reopen and reconsider the revoked I-130 petition.',                                          status:'warning',  categories:['appeals','greencard'], badges:['I-290B Appeal','I-130'] },
      { sortKey:202510, date:'Oct 2025',  title:'I-130 Reinstated',                        note:'NVC restored petition status following appeal; F1 priority date confirmed current.',                                   status:'success',  categories:['greencard','appeals'], badges:['I-130 Reinstated','F1 PD Current'] },
      { sortKey:202603, date:'Mar 2026',  title:'Congressional Inquiry Submitted',         note:"Senator Murray's office formally contacted USCIS on case's behalf to expedite processing.",                             status:'info',     categories:['appeals'],             badges:['Congressional Inquiry'] },
      { sortKey:202604, date:'Apr 2026',  title:'USCIS Status Update',                     note:'Agency acknowledged inquiry; confirmed case is under review but interview not yet scheduled.',                         status:'info',     categories:['appeals'],             badges:['USCIS Update'] },
      { sortKey:202605, date:'May 2026',  title:'Interview Scheduled',                     note:'USCIS confirmed interview appointment for June 9, 2026. Final step before decision.',                                  status:'success',  categories:['greencard'],           badges:['Interview Confirmed','June 9, 2026'] },
    ];

    let activeFilter = 'all';
    let sortAsc = true;
    let hintDismissed = false;

    function dismissHint() {
      if (hintDismissed) return;
      hintDismissed = true;
      const el = document.getElementById('hover-hint');
      if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }
    }

    function renderGrid() {
      const grid  = document.getElementById('cards-grid');
      const empty = document.getElementById('empty-state');
      grid.innerHTML = '';

      let events = EVENTS.filter(e => activeFilter === 'all' || e.categories.includes(activeFilter));
      events = [...events].sort((a, b) => sortAsc ? a.sortKey - b.sortKey : b.sortKey - a.sortKey);

      if (!events.length) { empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');

      let lastYear = null;

      events.forEach((ev, idx) => {
        const s = STATUS[ev.status];
        const year = Math.floor(ev.sortKey / 100);

        // Year divider — spans full grid width
        if (year !== lastYear) {
          const yd = document.createElement('div');
          yd.className = 'year-divider';
          yd.innerHTML = `<span>${year}</span>`;
          grid.appendChild(yd);
          lastYear = year;
        }

        // Badges
        const badgesHtml = ev.badges.map(b =>
          `<span class="inline-flex items-center text-[10px] font-semibold px-2 py-0.5 rounded-full ring-1 ${s.badge}">${b}</span>`
        ).join('');

        // Wrapper (for filter hiding + animation)
        const wrapper = document.createElement('div');
        wrapper.className = 'card-item';
        wrapper.dataset.categories = ev.categories.join(' ');
        wrapper.style.animationDelay = `${idx * 35}ms`;

        // Card
        const card = document.createElement('div');
        card.className = `hover-card ${s.border}`;

        card.innerHTML = `
          <!-- Summary: always visible -->
          <div class="card-summary">
            <span class="${s.dot} shrink-0">${s.icon}</span>
            <div class="flex-1 min-w-0">
              <time class="block text-[10px] font-semibold tracking-widest uppercase text-slate-400 mb-0.5">${ev.date}</time>
              <h2 class="font-semibold text-slate-800 text-sm leading-snug">${ev.title}</h2>
            </div>
            <svg class="chevron w-3.5 h-3.5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>

          <!-- Detail: revealed on hover / tap -->
          <div class="detail-panel">
            <div class="detail-inner">
              <p class="text-slate-500 text-xs leading-relaxed mb-2">${ev.note}</p>
              <div class="flex flex-wrap gap-1">${badgesHtml}</div>
            </div>
          </div>
        `;

        // Tap toggle (mobile)
        card.addEventListener('click', () => {
          dismissHint();
          const isOpen = card.classList.contains('open');
          document.querySelectorAll('.hover-card.open').forEach(c => c.classList.remove('open'));
          if (!isOpen) card.classList.add('open');
        });
        card.addEventListener('mouseenter', dismissHint);

        wrapper.appendChild(card);
        grid.appendChild(wrapper);
      });
    }

    // Filter
    document.getElementById('filter-bar').addEventListener('click', e => {
      const btn = e.target.closest('.filter-chip');
      if (!btn) return;
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderGrid();
    });

    // Sort
    const sortAscBtn  = document.getElementById('sort-asc');
    const sortDescBtn = document.getElementById('sort-desc');
    function setSortUI(asc) {
      sortAsc = asc;
      const on  = 'bg-white shadow text-slate-700';
      const off = 'text-slate-500';
      sortAscBtn.className  = `sort-btn text-xs font-medium px-3 py-1.5 rounded-full whitespace-nowrap ${asc ? on : off}`;
      sortDescBtn.className = `sort-btn text-xs font-medium px-3 py-1.5 rounded-full whitespace-nowrap ${asc ? off : on}`;
      renderGrid();
    }
    sortAscBtn.addEventListener('click',  () => setSortUI(true));
    sortDescBtn.addEventListener('click', () => setSortUI(false));

    renderGrid();
  </script>

</body>
</html>
